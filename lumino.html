<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LUMINO — Style Beyond Seasons</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ─── CSS Variables ─────────────────────────────────────────── */
    :root {
      --color-primary: #0a0a0a;
      --color-bg: #fafaf8;
      --color-gold: #c8a96e;
      --color-text-muted: #888;
      --color-border: #e5e5e5;
      --color-white: #ffffff;
      --color-error: #c0392b;
      --header-height: 64px;
      --cat-nav-height: 40px;
      --drawer-width: 280px;
      --transition-fast: 200ms ease;
      --transition-med: 300ms ease;
    }

    /* ─── Reset ─────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      color: var(--color-primary);
      background: var(--color-bg);
      -webkit-font-smoothing: antialiased;
      animation: pageFadeIn 400ms ease forwards;
    }
    img { display: block; max-width: 100%; }
    a { color: inherit; text-decoration: none; }
    ul, ol { list-style: none; }
    button { font-family: inherit; cursor: pointer; border: none; background: none; }
    input, textarea, select { font-family: inherit; }

    /* ─── Typography ─────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Playfair Display', serif;
      line-height: 1.25;
      font-weight: 500;
    }
    h1 { font-size: clamp(2rem, 5vw, 3.5rem); }
    h2 { font-size: clamp(1.5rem, 3vw, 2.25rem); }
    h3 { font-size: clamp(1.2rem, 2vw, 1.6rem); }
    h4 { font-size: 1.15rem; }
    h5 { font-size: 1rem; }
    h6 { font-size: 0.875rem; }
    p { margin-bottom: 0.75rem; }
    p:last-child { margin-bottom: 0; }

    /* ─── Page Fade-In ───────────────────────────────────────────── */
    @keyframes pageFadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── Header ─────────────────────────────────────────────────── */
    #lumino-header {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
    }
    .header-main {
      height: var(--header-height);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      max-width: 1440px;
      margin: 0 auto;
    }
    .header-left, .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
    }
    .header-right { justify-content: flex-end; }
    .header-center {
      flex: 0 0 auto;
      text-align: center;
    }
    .header-brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.6rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--color-primary);
      transition: opacity var(--transition-fast);
    }
    .header-brand:hover { opacity: 0.75; }
    .header-icon-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: transparent;
      font-size: 1.1rem;
      transition: background var(--transition-fast), transform var(--transition-fast);
      position: relative;
    }
    .header-icon-btn:hover { background: var(--color-border); }
    .header-icon-btn:active { transform: scale(0.92); }
    .cart-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--color-gold);
      color: var(--color-white);
      font-size: 0.6rem;
      font-weight: 600;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 3px;
      transform-origin: center;
      transition: transform var(--transition-fast);
    }
    .cart-badge.bounce {
      animation: cartBounce 400ms ease;
    }
    @keyframes cartBounce {
      0%   { transform: scale(1); }
      30%  { transform: scale(1.45); }
      60%  { transform: scale(0.9); }
      100% { transform: scale(1); }
    }

    /* ─── Inline Search Bar ──────────────────────────────────────── */
    .search-bar-wrapper {
      position: absolute;
      top: var(--header-height);
      left: 0;
      right: 0;
      background: var(--color-white);
      border-bottom: 1px solid var(--color-border);
      padding: 12px 24px;
      z-index: 999;
      display: none;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }
    .search-bar-wrapper.open { display: block; }
    .search-bar-inner {
      max-width: 640px;
      margin: 0 auto;
      position: relative;
    }
    .search-bar-input {
      width: 100%;
      padding: 10px 40px 10px 16px;
      border: 1px solid var(--color-border);
      border-radius: 4px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .search-bar-input:focus { border-color: var(--color-gold); }
    .search-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: var(--color-white);
      border: 1px solid var(--color-border);
      border-radius: 4px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      overflow: hidden;
      display: none;
    }
    .search-dropdown.open { display: block; }
    .search-dropdown-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background var(--transition-fast);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .search-dropdown-item:hover { background: var(--color-bg); }
    .search-dropdown-item img {
      width: 36px;
      height: 48px;
      object-fit: cover;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .search-see-all {
      display: block;
      padding: 10px 16px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--color-gold);
      border-top: 1px solid var(--color-border);
      text-align: center;
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .search-see-all:hover { background: var(--color-bg); }

    /* ─── Category Nav Bar ───────────────────────────────────────── */
    .category-nav {
      height: var(--cat-nav-height);
      border-top: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .category-nav::-webkit-scrollbar { display: none; }
    .category-nav a {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--color-primary);
      padding: 0 16px;
      height: 100%;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      white-space: nowrap;
      transition: color var(--transition-fast), border-color var(--transition-fast);
    }
    .category-nav a:hover { color: var(--color-gold); border-bottom-color: var(--color-gold); }
    .category-nav a.sale { color: var(--color-error); }
    .category-nav a.sale:hover { border-bottom-color: var(--color-error); }

    @media (max-width: 768px) {
      .category-nav { display: none; }
    }

    /* ─── Side Drawer ────────────────────────────────────────────── */
    .drawer-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 1100;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--transition-med);
    }
    .drawer-overlay.active {
      opacity: 1;
      pointer-events: all;
    }
    .drawer {
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      width: var(--drawer-width);
      background: var(--color-primary);
      color: var(--color-white);
      z-index: 1200;
      transform: translateX(-100%);
      transition: transform var(--transition-med);
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .drawer.open { transform: translateX(0); }
    .drawer-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 20px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .drawer-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--color-white);
    }
    .drawer-close {
      color: var(--color-white);
      font-size: 1.3rem;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: background var(--transition-fast);
    }
    .drawer-close:hover { background: rgba(255,255,255,0.1); }
    .drawer-nav { padding: 8px 0; flex: 1; }
    .drawer-category {
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    .drawer-category-toggle {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 13px 20px;
      color: var(--color-white);
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      transition: background var(--transition-fast);
      cursor: pointer;
    }
    .drawer-category-toggle:hover { background: rgba(255,255,255,0.06); }
    .drawer-chevron {
      font-size: 0.7rem;
      transition: transform var(--transition-fast);
    }
    .drawer-category.expanded .drawer-chevron { transform: rotate(180deg); }
    .drawer-subcategory {
      display: none;
      padding: 0 0 8px;
    }
    .drawer-category.expanded .drawer-subcategory { display: block; }
    .drawer-subcategory a {
      display: block;
      padding: 9px 20px 9px 32px;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.65);
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .drawer-subcategory a:hover { color: var(--color-gold); background: rgba(255,255,255,0.04); }
    .drawer-divider {
      height: 1px;
      background: rgba(255,255,255,0.12);
      margin: 8px 0;
    }
    .drawer-link {
      display: block;
      padding: 12px 20px;
      font-size: 0.85rem;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
      letter-spacing: 0.04em;
      transition: color var(--transition-fast), background var(--transition-fast);
    }
    .drawer-link:hover { color: var(--color-gold); background: rgba(255,255,255,0.04); }

    /* ─── Footer ─────────────────────────────────────────────────── */
    #lumino-footer {
      background: var(--color-primary);
      color: rgba(255,255,255,0.75);
      padding: 60px 24px 0;
    }
    .footer-grid {
      max-width: 1200px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 2fr 1fr 1fr 1.6fr;
      gap: 48px;
      padding-bottom: 48px;
    }
    @media (max-width: 1024px) {
      .footer-grid { grid-template-columns: 1fr 1fr; gap: 36px; }
    }
    @media (max-width: 600px) {
      .footer-grid { grid-template-columns: 1fr; gap: 28px; }
    }
    .footer-brand-logo {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      color: var(--color-white);
      margin-bottom: 12px;
    }
    .footer-tagline {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.05em;
      margin-bottom: 20px;
      font-style: italic;
    }
    .footer-social {
      display: flex;
      gap: 12px;
    }
    .footer-social a {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }
    .footer-social a:hover { border-color: var(--color-gold); background: rgba(200,169,110,0.1); }
    .footer-social svg { width: 15px; height: 15px; fill: rgba(255,255,255,0.7); }
    .footer-col h4 {
      font-family: 'Inter', sans-serif;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--color-white);
      margin-bottom: 16px;
    }
    .footer-col ul li + li { margin-top: 10px; }
    .footer-col ul a {
      font-size: 0.83rem;
      color: rgba(255,255,255,0.55);
      transition: color var(--transition-fast);
    }
    .footer-col ul a:hover { color: var(--color-gold); }
    .footer-newsletter-desc {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.5);
      margin-bottom: 14px;
      line-height: 1.55;
    }
    .footer-newsletter-form {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .footer-newsletter-input {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 3px;
      padding: 10px 14px;
      color: var(--color-white);
      font-size: 0.83rem;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .footer-newsletter-input::placeholder { color: rgba(255,255,255,0.3); }
    .footer-newsletter-input:focus { border-color: var(--color-gold); }
    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.1);
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.75rem;
      color: rgba(255,255,255,0.35);
    }
    .footer-bottom-links {
      display: flex;
      gap: 20px;
    }
    .footer-bottom-links a {
      color: rgba(255,255,255,0.35);
      transition: color var(--transition-fast);
    }
    .footer-bottom-links a:hover { color: rgba(255,255,255,0.7); }

    /* ─── Buttons ─────────────────────────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 28px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      border-radius: 2px;
      cursor: pointer;
      transition: background var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast), box-shadow var(--transition-fast);
      border: 1px solid transparent;
      text-decoration: none;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--color-primary);
      color: var(--color-white);
      border-color: var(--color-primary);
    }
    .btn-primary:hover { background: #2a2a2a; border-color: #2a2a2a; }
    .btn-outlined {
      background: transparent;
      color: var(--color-primary);
      border-color: var(--color-primary);
    }
    .btn-outlined:hover { background: var(--color-primary); color: var(--color-white); }
    .btn-gold {
      background: var(--color-gold);
      color: var(--color-white);
      border-color: var(--color-gold);
    }
    .btn-gold:hover { background: #b8945a; border-color: #b8945a; }
    .btn-sm { padding: 8px 18px; font-size: 0.72rem; }
    .btn-lg { padding: 16px 40px; font-size: 0.85rem; }
    .btn-full { width: 100%; }

    /* ─── Product Cards ──────────────────────────────────────────── */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 24px;
    }
    @media (max-width: 1200px) { .product-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 900px)  { .product-grid { grid-template-columns: repeat(2, 1fr); gap: 16px; } }
    @media (max-width: 480px)  { .product-grid { grid-template-columns: 1fr; } }

    .product-card {
      position: relative;
      cursor: pointer;
    }
    .product-card-image-wrap {
      position: relative;
      aspect-ratio: 3/4;
      overflow: hidden;
      border-radius: 2px;
      background: #f0eeea;
    }
    .product-card-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform 500ms ease, opacity var(--transition-med);
    }
    .product-card-image-wrap img.img-hover {
      position: absolute;
      inset: 0;
      opacity: 0;
    }
    .product-card:hover .product-card-image-wrap img.img-main { opacity: 0; }
    .product-card:hover .product-card-image-wrap img.img-hover { opacity: 1; }
    .product-card:hover .product-card-image-wrap img { transform: scale(1.04); }
    .product-card-actions {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      transform: translateY(8px);
      opacity: 0;
      transition: opacity var(--transition-fast), transform var(--transition-fast);
    }
    .product-card:hover .product-card-actions {
      transform: translateY(0);
      opacity: 1;
    }
    .product-card-wishlist {
      width: 38px;
      height: 38px;
      background: var(--color-white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.12);
      flex-shrink: 0;
      transition: background var(--transition-fast);
    }
    .product-card-wishlist:hover { background: #fef0f0; }
    .product-badges {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .badge {
      display: inline-block;
      padding: 3px 8px;
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      border-radius: 1px;
    }
    .badge-new { background: var(--color-primary); color: var(--color-white); }
    .badge-sale { background: var(--color-error); color: var(--color-white); }
    .badge-bestseller { background: var(--color-gold); color: var(--color-white); }
    .product-card-info { padding: 12px 4px 0; }
    .product-card-brand {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      margin-bottom: 4px;
    }
    .product-card-name {
      font-size: 0.9rem;
      font-weight: 400;
      color: var(--color-primary);
      margin-bottom: 6px;
      line-height: 1.35;
    }
    .product-card-price {
      display: flex;
      align-items: baseline;
      gap: 8px;
    }
    .price-current { font-size: 0.9rem; font-weight: 600; color: var(--color-primary); }
    .price-original {
      font-size: 0.8rem;
      color: var(--color-text-muted);
      text-decoration: line-through;
    }
    .price-sale { color: var(--color-error); }

    /* ─── Form Inputs ────────────────────────────────────────────── */
    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
      color: var(--color-primary);
    }
    .form-input, .form-select, .form-textarea {
      width: 100%;
      padding: 11px 14px;
      border: 1px solid var(--color-border);
      border-radius: 2px;
      font-size: 0.875rem;
      background: var(--color-white);
      color: var(--color-primary);
      outline: none;
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--color-gold);
      box-shadow: 0 0 0 3px rgba(200,169,110,0.15);
    }
    .form-input.error, .form-select.error, .form-textarea.error {
      border-color: var(--color-error);
      box-shadow: 0 0 0 3px rgba(192,57,43,0.1);
    }
    .form-error-msg {
      font-size: 0.72rem;
      color: var(--color-error);
      margin-top: 4px;
    }

    /* ─── Toast ──────────────────────────────────────────────────── */
    #toast-container {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 9999;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      pointer-events: none;
    }
    .toast {
      background: var(--color-primary);
      color: var(--color-white);
      padding: 12px 24px;
      border-radius: 3px;
      font-size: 0.83rem;
      font-weight: 500;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      animation: toastSlideIn 300ms ease forwards;
      pointer-events: all;
    }
    .toast.removing { animation: toastSlideOut 250ms ease forwards; }
    @keyframes toastSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastSlideOut {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-10px); }
    }

    /* ─── Back to Top ────────────────────────────────────────────── */
    #back-to-top {
      position: fixed;
      bottom: 32px;
      right: 28px;
      width: 42px;
      height: 42px;
      background: var(--color-primary);
      color: var(--color-white);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      z-index: 800;
      opacity: 0;
      pointer-events: none;
      transform: translateY(12px);
      transition: opacity var(--transition-fast), transform var(--transition-fast);
      box-shadow: 0 4px 16px rgba(0,0,0,0.18);
      cursor: pointer;
    }
    #back-to-top.visible {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0);
    }
    #back-to-top:hover { background: #333; }
    #back-to-top:active { transform: scale(0.93); }

    /* ─── Skeleton / Loading Shimmer ─────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, #f0eeea 25%, #e8e5e0 50%, #f0eeea 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 2px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton-card {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .skeleton-image {
      aspect-ratio: 3/4;
      width: 100%;
    }
    .skeleton-line {
      height: 12px;
      width: 100%;
    }
    .skeleton-line.short { width: 55%; }

    /* ─── Chat Widget ────────────────────────────────────────────── */
    #chat-root { position: fixed; bottom: 28px; right: 80px; z-index: 850; }
    .chat-fab {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--color-gold);
      color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.35rem;
      box-shadow: 0 4px 20px rgba(200,169,110,0.45);
      cursor: pointer;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast);
      border: none;
    }
    .chat-fab:hover { transform: scale(1.08); box-shadow: 0 6px 24px rgba(200,169,110,0.55); }
    .chat-fab:active { transform: scale(0.96); }
    .chat-window {
      position: absolute;
      bottom: 68px;
      right: 0;
      width: 360px;
      height: 520px;
      background: var(--color-white);
      border-radius: 8px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.16);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateY(16px) scale(0.97);
      transform-origin: bottom right;
      transition: opacity var(--transition-med), transform var(--transition-med);
    }
    .chat-window.open {
      opacity: 1;
      pointer-events: all;
      transform: translateY(0) scale(1);
    }
    .chat-window-header {
      background: var(--color-primary);
      color: var(--color-white);
      padding: 16px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .chat-window-title {
      font-family: 'Playfair Display', serif;
      font-size: 1rem;
    }
    .chat-window-close {
      color: rgba(255,255,255,0.7);
      font-size: 1.1rem;
      transition: color var(--transition-fast);
    }
    .chat-window-close:hover { color: var(--color-white); }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      background: var(--color-bg);
    }
    .chat-bubble {
      max-width: 80%;
      padding: 9px 13px;
      border-radius: 16px;
      font-size: 0.83rem;
      line-height: 1.45;
    }
    .chat-bubble.agent {
      background: var(--color-white);
      border: 1px solid var(--color-border);
      align-self: flex-start;
      border-bottom-left-radius: 4px;
    }
    .chat-bubble.user {
      background: var(--color-gold);
      color: var(--color-white);
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
    .chat-input-bar {
      display: flex;
      gap: 8px;
      padding: 12px;
      border-top: 1px solid var(--color-border);
      flex-shrink: 0;
      background: var(--color-white);
    }
    .chat-input {
      flex: 1;
      padding: 9px 12px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.83rem;
      outline: none;
      transition: border-color var(--transition-fast);
    }
    .chat-input:focus { border-color: var(--color-gold); }
    .chat-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--color-gold);
      color: var(--color-white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
      transition: background var(--transition-fast);
    }
    .chat-send-btn:hover { background: #b8945a; }

    /* ─── Layout Utilities ───────────────────────────────────────── */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px;
    }
    .section { padding: 60px 0; }
    .section-title {
      font-family: 'Playfair Display', serif;
      margin-bottom: 8px;
    }
    .section-sub {
      color: var(--color-text-muted);
      font-size: 0.85rem;
      margin-bottom: 36px;
    }
    .divider { height: 1px; background: var(--color-border); margin: 32px 0; }

    /* ─── Responsive Helpers ─────────────────────────────────────── */
    @media (max-width: 768px) {
      .hide-mobile { display: none !important; }
      .container { padding: 0 16px; }
      .section { padding: 40px 0; }
      #back-to-top { bottom: 24px; right: 16px; }
      #chat-root { right: 16px; }
      .chat-window { width: calc(100vw - 32px); right: 0; }
    }
    @media (min-width: 769px) { .show-mobile-only { display: none !important; } }
    @media (max-width: 1024px) { .hide-tablet { display: none !important; } }
  </style>
</head>
<body>
<div id="app">
  <div id="header-root"></div>
  <div id="drawer-root"></div>
  <main id="app-content" style="margin-top:104px; min-height:80vh;"></main>
  <div id="footer-root"></div>
  <div id="chat-root"></div>
  <div id="toast-container"></div>
</div>

<button id="back-to-top" aria-label="Back to top">&#8593;</button>

<script>
  /* ─── Global State ─────────────────────────────────────────────── */
  window.PRODUCTS     = [];
  window.CART         = [];
  window.ORDERS       = [];
  window.USERS        = [];
  window.CURRENT_USER = null;
  window.SEARCH_QUERY = "";
  window.CHAT_HISTORY = [];

  /* ─── Router ───────────────────────────────────────────────────── */
  function navigate(hash) { window.location.hash = hash; }

  window.addEventListener('hashchange', renderPage);

  function renderPage() {
    const hash = window.location.hash || '#/';
    const content = document.getElementById('app-content');
    if (!content) return;

    if (hash === '#/' || hash === '') {
      renderHome();
    } else if (hash.startsWith('#/category/')) {
      const slug = hash.replace('#/category/', '');
      renderPLP(slug);
    } else if (hash.startsWith('#/product/')) {
      const id = hash.replace('#/product/', '');
      renderPDP(id);
    } else if (hash === '#/cart') {
      renderCart();
    } else if (hash === '#/checkout') {
      renderCheckout();
    } else if (hash.startsWith('#/order/')) {
      const id = hash.replace('#/order/', '');
      renderOrderConfirmation(id);
    } else if (hash === '#/register') {
      renderRegister();
    } else if (hash === '#/login') {
      renderLogin();
    } else if (hash === '#/account') {
      renderAccount();
    } else if (hash === '#/search') {
      renderSearch();
    } else {
      content.innerHTML = '<div class="container section"><p>Page not found.</p></div>';
    }
  }

  function renderHome()              { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderPLP(slug)           { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderPDP(id)             { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderCart()              { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderCheckout()          { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderOrderConfirmation(id){ document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderRegister()          { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderLogin()             { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderAccount()           { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }
  function renderSearch()            { document.getElementById('app-content').innerHTML = '<p>Loading...</p>'; }

  /* ─── Header ───────────────────────────────────────────────────── */
  function renderHeader() {
    const root = document.getElementById('header-root');
    if (!root) return;
    root.innerHTML = `
      <header id="lumino-header">
        <div class="header-main">

            </button>
          </div>
          <div class="header-center">
            <a href="#/" class="header-brand">LUMINO</a>
          </div>
          <div class="header-right">
            <button class="header-icon-btn" onclick="toggleSearch()" aria-label="Search">&#128269;</button>
            <a href="${window.CURRENT_USER ? '#/account' : '#/login'}" class="header-icon-btn" aria-label="Account">&#128100;</a>
            <a href="#/cart" class="header-icon-btn" aria-label="Cart" style="position:relative;">
              &#128717;
              <span class="cart-badge" id="cart-badge">0</span>
            </a>
          </div>
        </div>
        <nav class="category-nav" aria-label="Category navigation">
          <a href="#/category/women">Women</a>
          <a href="#/category/men">Men</a>
          <a href="#/category/kids">Kids</a>
          <a href="#/category/shoes">Shoes</a>
          <a href="#/category/bags">Bags</a>
          <a href="#/category/accessories">Accessories</a>
          <a href="#/sale" class="sale">Sale</a>
        </nav>
        <div class="search-bar-wrapper" id="search-bar-wrapper">
          <div class="search-bar-inner">
            <input
              class="search-bar-input"
              id="search-bar-input"
              type="text"
              placeholder="Search for styles, brands, or looks..."
              autocomplete="off"
              oninput="handleSearchInput(this.value)"
            />
            <div class="search-dropdown" id="search-dropdown"></div>
          </div>
        </div>
      </header>
    `;
  }

  function toggleSearch() {
    const wrapper = document.getElementById('search-bar-wrapper');
    if (!wrapper) return;
    const isOpen = wrapper.classList.toggle('open');
    if (isOpen) {
      setTimeout(() => {
        const inp = document.getElementById('search-bar-input');
        if (inp) inp.focus();
      }, 50);
    } else {
      const dd = document.getElementById('search-dropdown');
      if (dd) { dd.classList.remove('open'); dd.innerHTML = ''; }
    }
  }

  function handleSearchInput(query) {
    window.SEARCH_QUERY = query.trim();
    const dd = document.getElementById('search-dropdown');
    if (!dd) return;
    if (!query.trim()) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

    const q = query.toLowerCase();
    const matches = window.PRODUCTS.filter(p =>
      p.name.toLowerCase().includes(q) || (p.category || '').toLowerCase().includes(q)
    ).slice(0, 5);

    if (!matches.length) { dd.classList.remove('open'); dd.innerHTML = ''; return; }

    dd.innerHTML = matches.map(p => `
      <div class="search-dropdown-item" onclick="navigate('#/product/${p.id}'); toggleSearch();">
        ${p.image ? `<img src="${p.image}" alt="${p.name}" />` : ''}
        <span>${p.name}</span>
        <span style="margin-left:auto;font-weight:600;font-size:0.8rem;">${formatPrice(p.price)}</span>
      </div>
    `).join('') + `
      <span class="search-see-all" onclick="navigate('#/search'); toggleSearch();">See all results &rarr;</span>
    `;
    dd.classList.add('open');
  }

  /* ─── Drawer ───────────────────────────────────────────────────── */
  function renderDrawer() {
    const root = document.getElementById('drawer-root');
    if (!root) return;

    const categories = [
      { label: 'Women',       slug: 'women',       subs: ['Tops', 'Dresses', 'Bottoms', 'Outerwear'] },
      { label: 'Men',         slug: 'men',         subs: ['Shirts', 'Trousers', 'Jackets', 'Suits'] },
      { label: 'Kids',        slug: 'kids',        subs: ['Girls', 'Boys', 'Baby'] },
      { label: 'Shoes',       slug: 'shoes',       subs: ['Heels', 'Flats', 'Sneakers', 'Boots'] },
      { label: 'Bags',        slug: 'bags',        subs: ['Totes', 'Clutches', 'Backpacks'] },
      { label: 'Accessories', slug: 'accessories', subs: ['Jewellery', 'Scarves', 'Belts', 'Hats'] },
    ];

    root.innerHTML = `
      <div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>
      <nav class="drawer" id="drawer" aria-label="Side navigation">
        <div class="drawer-header">
          <span class="drawer-logo">LUMINO</span>
          <button class="drawer-close" onclick="closeDrawer()" aria-label="Close menu">&#10005;</button>
        </div>
        <div class="drawer-nav">
          ${categories.map(cat => `
            <div class="drawer-category" id="drawer-cat-${cat.slug}">
              <button class="drawer-category-toggle" onclick="toggleDrawerCategory('${cat.slug}')">
                <span>${cat.label}</span>
                <span class="drawer-chevron">&#9660;</span>
              </button>
              <div class="drawer-subcategory">
                ${cat.subs.map(sub => `
                  <a href="#/category/${cat.slug}-${sub.toLowerCase()}" onclick="closeDrawer()">${sub}</a>
                `).join('')}
                <a href="#/category/${cat.slug}" onclick="closeDrawer()" style="color:var(--color-gold);font-weight:600;">View All ${cat.label}</a>
              </div>
            </div>
          `).join('')}
          <div class="drawer-category">
            <a class="drawer-link" href="#/sale" onclick="closeDrawer()" style="color:#e74c3c;">Sale</a>
          </div>
          <div class="drawer-divider"></div>
          <a class="drawer-link" href="#/" onclick="closeDrawer()">New Arrivals</a>
          <a class="drawer-link" href="#/" onclick="closeDrawer()">Trending</a>
          <div class="drawer-divider"></div>
          <a class="drawer-link" href="${window.CURRENT_USER ? '#/account' : '#/login'}" onclick="closeDrawer()">My Account</a>
          <a class="drawer-link" href="#/account" onclick="closeDrawer()">Orders</a>
          <a class="drawer-link" href="#/">Help &amp; Contact</a>
        </div>
      </nav>
    `;
  }

  function toggleDrawerCategory(slug) {
    const el = document.getElementById('drawer-cat-' + slug);
    if (el) el.classList.toggle('expanded');
  }

  function openDrawer() {
    const drawer  = document.getElementById('drawer');
    const overlay = document.getElementById('drawer-overlay');
    if (drawer)  drawer.classList.add('open');
    if (overlay) overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeDrawer() {
    const drawer  = document.getElementById('drawer');
    const overlay = document.getElementById('drawer-overlay');
    if (drawer)  drawer.classList.remove('open');
    if (overlay) overlay.classList.remove('active');
    document.body.style.overflow = '';
  }

  /* ─── Footer ───────────────────────────────────────────────────── */
  function renderFooter() {

              </a>
              <a href="#" aria-label="TikTok">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-2.88 2.5 2.89 2.89 0 0 1-2.89-2.89 2.89 2.89 0 0 1 2.89-2.89c.28 0 .54.04.79.1V9.01a6.32 6.32 0 0 0-.79-.05 6.34 6.34 0 0 0-6.34 6.34 6.34 6.34 0 0 0 6.34 6.34 6.34 6.34 0 0 0 6.33-6.34V8.69a8.18 8.18 0 0 0 4.78 1.52V6.77a4.85 4.85 0 0 1-1.01-.08z"/></svg>
              </a>
            </div>
          </div>
          <div class="footer-col">
            <h4>Shop</h4>
            <ul>
              <li><a href="#/category/women">Women</a></li>
              <li><a href="#/category/men">Men</a></li>
              <li><a href="#/category/kids">Kids</a></li>
              <li><a href="#/category/shoes">Shoes</a></li>

              <li><a href="#/sale">Sale</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h4>Help</h4>
            <ul>
              <li><a href="#/">Customer Service</a></li>
              <li><a href="#/">Shipping &amp; Returns</a></li>
              <li><a href="#/">Size Guide</a></li>
              <li><a href="#/">Track My Order</a></li>
              <li><a href="#/">FAQs</a></li>
              <li><a href="#/">Store Locator</a></li>
              <li><a href="#/">Contact Us</a></li>
            </ul>
          </div>
          <div class="footer-col">
            <h4>Newsletter</h4>
            <p class="footer-newsletter-desc">Be the first to hear about new arrivals, exclusive offers, and style inspiration.</p>
            <div class="footer-newsletter-form">
              <input class="footer-newsletter-input" type="email" placeholder="Your email address" />
              <button class="btn btn-gold btn-sm" onclick="handleNewsletterSignup(event)">Subscribe</button>

            <a href="#/">Terms &amp; Conditions</a>
            <a href="#/">Cookie Settings</a>
          </div>
        </div>
      </footer>
    `;
  }

  function handleNewsletterSignup(e) {
    const form = e.target.closest('.footer-newsletter-form');
    const input = form ? form.querySelector('input') : null;
    if (!input) return;
    const email = input.value.trim();
    if (!email || !email.includes('@')) {
      showToast('Please enter a valid email address.');
      return;
    }
    input.value = '';
    showToast('Thanks for subscribing! Welcome to LUMINO.');
  }

  /* ─── Utilities ─────────────────────────────────────────────────── */
  function updateCartBadge() {
    const badge = document.getElementById('cart-badge');
    if (!badge) return;
    const count = window.CART.reduce((acc, item) => acc + (item.qty || 1), 0);
    badge.textContent = count;
    badge.style.display = count > 0 ? 'flex' : 'none';
    if (count > 0) {
      badge.classList.remove('bounce');
      void badge.offsetWidth;
      badge.classList.add('bounce');
    }
  }

  function showToast(message) {
    const container = document.getElementById('toast-container');
    if (!container) return;
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add('removing');
      setTimeout(() => { if (toast.parentNode) toast.parentNode.removeChild(toast); }, 260);
    }, 2500);
  }

  function formatPrice(num) {

/* ── Filter / Sort Helpers ───────────────────────────────────────── */
function filterProducts(filters) {
  if (!filters) return window.PRODUCTS.slice();
  return window.PRODUCTS.filter(p => {
    if (filters.category    && p.category    !== filters.category)    return false;
    if (filters.subcategory && p.subcategory !== filters.subcategory) return false;
    if (filters.minPrice    != null && p.price < filters.minPrice)    return false;
    if (filters.maxPrice    != null && p.price > filters.maxPrice)    return false;
    if (filters.minRating   != null && p.rating < filters.minRating)  return false;
    if (filters.inStockOnly && !p.inStock)                            return false;
    if (filters.sizes && filters.sizes.length) {
      if (!filters.sizes.some(s => p.sizes.includes(s))) return false;
    }
    if (filters.colors && filters.colors.length) {
      if (!filters.colors.some(c => p.colors.includes(c))) return false;
    }
    if (filters.brands && filters.brands.length) {
      if (!filters.brands.includes(p.brand)) return false;
    }
    if (filters.tags && filters.tags.length) {
      if (!filters.tags.some(t => p.tags.includes(t))) return false;
    }
    if (filters.searchQuery) {
      const q = filters.searchQuery.toLowerCase();
      const hay = [p.name,p.brand,p.category,p.subcategory,p.description,p.tags.join(' ')].join(' ').toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
}

function searchProducts(query) {
  if (!query) return window.PRODUCTS.slice();
  const q = query.toLowerCase();
  return window.PRODUCTS.filter(p => {
    const hay = [p.name,p.brand,p.category,p.subcategory,p.description,p.tags.join(' ')].join(' ').toLowerCase();
    return hay.includes(q);
  });
}

function sortProducts(products, sortKey) {
  const arr = products.slice();
  switch (sortKey) {
    case 'price_asc':  return arr.sort((a,b) => a.price - b.price);
    case 'price_desc': return arr.sort((a,b) => b.price - a.price);
    case 'newest':     return arr.sort((a,b) => a.id.localeCompare(b.id));
    case 'rating':     return arr.sort((a,b) => b.rating - a.rating);
    case 'recommended':
    default:
      return arr.sort((a,b) => {
        if (b.featured !== a.featured) return b.featured ? 1 : -1;
        return b.rating - a.rating;
      });
  }
}

    if (g) g.style.gridTemplateColumns = window.innerWidth < 768 ? 'repeat(2,1fr)' : 'repeat(2,1fr)';

  applyAndRender();
}

              ${p.images.map((img, i) => `<img src="${img}" alt="" loading="lazy" onclick="document.getElementById('pdp-main-img').src='${img}';document.querySelectorAll('.pdp-thumb').forEach((t,ti)=>t.style.borderColor=ti===${i}?'var(--color-gold)':'transparent');" class="pdp-thumb" style="width:80px;height:80px;object-fit:cover;border-radius:2px;border:2px solid ${i===0?'var(--color-gold)':'transparent'};cursor:pointer;flex-shrink:0;transition:border-color 150ms;"/>`).join('')}
            </div>
          </div>

          <!-- RIGHT: Info -->
          <div>
            <p style="font-size:0.72rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:8px;">${p.brand}</p>
            <h1 style="font-family:'Playfair Display',serif;font-size:1.75rem;line-height:1.2;margin-bottom:12px;">${p.name}</h1>

            <!-- Stars -->
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
              <span style="color:var(--color-gold);">${starsHTML(p.rating)}</span>
              <a href="#reviews" style="font-size:0.8rem;color:var(--color-text-muted);text-decoration:none;" onmouseover="this.style.color='var(--color-gold)'" onmouseout="this.style.color='var(--color-text-muted)'">(${p.reviews} reviews)</a>
            </div>

            <!-- Price -->
            <div style="margin-bottom:24px;">
              ${p.discount
                ? `<div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
                    <span style="text-decoration:line-through;color:#aaa;font-size:1rem;">${formatPrice(p.originalPrice)}</span>
                    <span style="color:#c0392b;font-size:1.5rem;font-weight:700;">${formatPrice(p.price)}</span>
                    <span style="background:#c0392b;color:#fff;font-size:0.7rem;font-weight:700;padding:3px 8px;border-radius:3px;">-${p.discount}%</span>
                  </div>`
                : `<span style="font-size:1.5rem;font-weight:700;">${formatPrice(p.price)}</span>`}
            </div>

            <!-- Color -->
            <div style="margin-bottom:20px;">
              <p style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Color: <span id="pdp-color-label" style="font-weight:400;">${selectedColor}</span></p>
              <div style="display:flex;flex-wrap:wrap;gap:8px;" id="pdp-colors">
                ${p.colors.map(c => `<button title="${c}" onclick="pdpSelectColor('${c}')" class="pdp-color-swatch" data-color="${c}" style="width:28px;height:28px;border-radius:50%;background:${getColor(c)};border:${c===selectedColor?'3px solid var(--color-gold)':'2px solid rgba(0,0,0,0.12)'};cursor:pointer;transition:border 150ms;position:relative;" title="${c}"></button>`).join('')}
              </div>
            </div>

            <!-- Size -->
            <div style="margin-bottom:20px;">
              <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                <p style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;">Size: <span id="pdp-size-label" style="font-weight:400;">${selectedSize||'Select'}</span></p>
                <button onclick="document.getElementById('size-guide-modal').style.display='flex'" style="font-size:0.75rem;color:var(--color-gold);background:none;border:none;cursor:pointer;text-decoration:underline;">Size Guide</button>
              </div>
              <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(52px,1fr));gap:8px;" id="pdp-sizes">
                ${p.sizes.map(s => `<button onclick="pdpSelectSize('${s}')" data-size="${s}" class="pdp-size-pill" style="padding:10px 4px;border:1px solid ${s===selectedSize?'var(--color-primary)':'var(--color-border)'};background:${s===selectedSize?'var(--color-primary)':'#fff'};color:${s===selectedSize?'#fff':'var(--color-primary)'};border-radius:2px;font-size:0.8rem;cursor:pointer;transition:all 150ms;">${s}</button>`).join('')}
              </div>
              <p id="pdp-size-error" style="color:#c0392b;font-size:0.75rem;margin-top:6px;display:none;">Please select a size.</p>
            </div>

            <!-- Qty -->
            <div style="margin-bottom:24px;">
              <p style="font-size:0.78rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Quantity</p>
              <div style="display:flex;align-items:center;gap:0;border:1px solid var(--color-border);border-radius:2px;width:fit-content;">
                <button onclick="if(pdpQty>1){pdpQty--;document.getElementById('pdp-qty').textContent=pdpQty;}" style="width:40px;height:40px;background:none;border:none;font-size:1.2rem;cursor:pointer;border-right:1px solid var(--color-border);">−</button>
                <span id="pdp-qty" style="width:48px;text-align:center;font-size:0.9rem;">${qty}</span>
                <button onclick="if(pdpQty<10){pdpQty++;document.getElementById('pdp-qty').textContent=pdpQty;}" style="width:40px;height:40px;background:none;border:none;font-size:1.2rem;cursor:pointer;border-left:1px solid var(--color-border);">+</button>
              </div>
            </div>

            <!-- CTA Buttons -->
            <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:28px;">
              <button class="btn btn-primary btn-lg btn-full" id="pdp-atb-btn" onclick="pdpAddToBag()">Add to Bag</button>
              <button class="btn btn-outlined btn-lg btn-full" id="pdp-wl-btn" onclick="this.textContent=this.textContent.includes('🤍')?'❤️  Saved to Wishlist':'🤍  Save to Wishlist';">🤍&nbsp; Save to Wishlist</button>
            </div>

            <!-- Description -->
            <p style="font-size:0.9rem;line-height:1.75;color:#444;margin-bottom:28px;">${p.description}</p>

            <!-- Accordions -->
            <div id="pdp-accordions">
              ${accordions.map((a,i)=>`
                <div style="border-top:1px solid var(--color-border);">
                  <button onclick="pdpToggleAccordion(${i})" style="width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 0;background:none;border:none;cursor:pointer;font-size:0.875rem;font-weight:600;text-align:left;">
                    ${a.title} <span id="pdp-chevron-${i}" style="transition:transform 200ms;font-size:0.7rem;">▼</span>
                  </button>
                  <div id="pdp-acc-${i}" style="display:none;padding-bottom:16px;">${a.content}</div>
                </div>`).join('')}
              <div style="border-top:1px solid var(--color-border);"></div>
            </div>

            <!-- Trust badges -->
            <div style="display:flex;gap:0;margin-top:24px;border:1px solid var(--color-border);border-radius:4px;overflow:hidden;">
              ${['🔄 Free Returns','🔒 Secure Checkout','🌱 Sustainably Sourced'].map(b=>`<div style="flex:1;text-align:center;padding:12px 8px;font-size:0.7rem;font-weight:600;letter-spacing:0.04em;border-right:1px solid var(--color-border);">${b}</div>`).join('')}
            </div>
          </div>
        </div>

        <!-- Complete the Look -->
        ${related.length ? `<div style="margin-top:64px;">
          <h2 style="font-family:'Playfair Display',serif;margin-bottom:24px;">Complete the Look</h2>
          <div style="display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none;">
            ${related.map(q=>productThumbHTML(q)).join('')}
          </div>
        </div>` : ''}

        <!-- Also Viewed -->
        ${alsoViewed.length ? `<div style="margin-top:48px;">
          <h2 style="font-family:'Playfair Display',serif;margin-bottom:24px;">Customers Also Viewed</h2>
          <div style="display:flex;gap:16px;overflow-x:auto;padding-bottom:16px;scrollbar-width:none;">
            ${alsoViewed.map(q=>productThumbHTML(q)).join('')}
          </div>
        </div>` : ''}

        <!-- Reviews -->
        <div id="reviews" style="margin-top:64px;">
          <h2 style="font-family:'Playfair Display',serif;margin-bottom:28px;">Customer Reviews</h2>
          <div style="display:grid;grid-template-columns:auto 1fr;gap:32px;align-items:start;margin-bottom:40px;">
            <div style="text-align:center;padding:24px 32px;border:1px solid var(--color-border);border-radius:8px;">
              <div style="font-size:3rem;font-weight:700;line-height:1;">${p.rating.toFixed(1)}</div>
              <div style="color:var(--color-gold);font-size:1.2rem;margin:6px 0;">${starsHTML(p.rating)}</div>
              <div style="font-size:0.75rem;color:var(--color-text-muted);">Based on ${p.reviews} reviews</div>
            </div>
            <div>
              ${ratingDist.map(r => `
                <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                  <span style="font-size:0.8rem;min-width:16px;">${r.s}★</span>
                  <div style="flex:1;height:8px;background:#eee;border-radius:4px;overflow:hidden;">
                    <div style="height:100%;width:${p.reviews>0?Math.round(r.pct/p.reviews*100):0}%;background:var(--color-gold);border-radius:4px;"></div>
                  </div>
                  <span style="font-size:0.75rem;color:var(--color-text-muted);min-width:28px;">${r.pct}</span>
                </div>`).join('')}
            </div>
          </div>
          <div style="display:flex;flex-direction:column;gap:20px;">
            ${reviewSubset.map(r=>`
              <div style="padding:24px;border:1px solid var(--color-border);border-radius:6px;background:#fff;">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
                  <strong style="font-size:0.875rem;">${r.name}</strong>
                  <span style="color:var(--color-gold);font-size:0.9rem;">${'★'.repeat(r.stars)}${'☆'.repeat(5-r.stars)}</span>
                </div>
                <p style="font-size:0.875rem;color:#555;line-height:1.6;margin:0;">"${r.text}"</p>
              </div>`).join('')}
          </div>
        </div>
      </div>
    `;

    /* Mobile: stack grid */
    if (window.innerWidth < 768) {
      const g = document.getElementById('pdp-grid');
      if (g) g.style.gridTemplateColumns = '1fr';
    }
  }

  /* PDP helper fns — attached to window so inline handlers can reach them */
  window.pdpQty = 1;
  window.pdpSelectedSize = '';
  window.pdpSelectedColor = p.colors[0];

  window.pdpSelectSize = function(s) {
    window.pdpSelectedSize = s;
    document.querySelectorAll('.pdp-size-pill').forEach(el => {
      const active = el.dataset.size === s;
      el.style.background = active ? 'var(--color-primary)' : '#fff';
      el.style.color = active ? '#fff' : 'var(--color-primary)';
      el.style.borderColor = active ? 'var(--color-primary)' : 'var(--color-border)';
    });
    const lbl = document.getElementById('pdp-size-label');
    if (lbl) lbl.textContent = s;
    const err = document.getElementById('pdp-size-error');
    if (err) err.style.display = 'none';
  };

  window.pdpSelectColor = function(c) {
    window.pdpSelectedColor = c;
    document.querySelectorAll('.pdp-color-swatch').forEach(el => {
      el.style.border = el.dataset.color === c ? '3px solid var(--color-gold)' : '2px solid rgba(0,0,0,0.12)';
    });
    const lbl = document.getElementById('pdp-color-label');
    if (lbl) lbl.textContent = c;
  };

  window.pdpAddToBag = function() {
    if (!window.pdpSelectedSize) {
      const err = document.getElementById('pdp-size-error');
      if (err) err.style.display = 'block';
      const btn = document.getElementById('pdp-atb-btn');
      if (btn) { btn.style.animation = 'none'; void btn.offsetWidth; btn.style.animation = 'pdpShake 400ms ease'; }
      return;
    }
    addToCart(p.id, window.pdpSelectedSize, window.pdpSelectedColor, window.pdpQty);
    showToast('Added to bag! 🛍');
    updateCartBadge();
  };

  window.pdpToggleAccordion = function(i) {
    const body = document.getElementById('pdp-acc-'+i);
    const chev = document.getElementById('pdp-chevron-'+i);
    if (!body) return;
    const open = body.style.display === 'block';
    body.style.display = open ? 'none' : 'block';
    if (chev) chev.style.transform = open ? '' : 'rotate(180deg)';
  };

  function productThumbHTML(q) {
    return `<div style="width:220px;flex-shrink:0;cursor:pointer;" onclick="navigate('#/product/${q.id}')">
      <div style="aspect-ratio:3/4;overflow:hidden;border-radius:2px;background:#f0eeea;">
        <img src="${q.images[0]}" alt="${q.name}" style="width:100%;height:100%;object-fit:cover;transition:transform 400ms;" onmouseover="this.style.transform='scale(1.04)'" onmouseout="this.style.transform='scale(1)'" loading="lazy"/>
      </div>
      <div style="padding:10px 4px 0;">
        <div style="font-size:0.7rem;color:#888;margin-bottom:3px;text-transform:uppercase;letter-spacing:0.06em;">${q.brand}</div>
        <div style="font-size:0.875rem;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;">${q.name}</div>
        <div style="font-size:0.875rem;font-weight:600;margin-top:4px;">${formatPrice(q.price)}</div>
      </div>
    </div>`;
  }

  /* Inject shake keyframe once */
  if (!document.getElementById('pdp-shake-style')) {
    const st = document.createElement('style');
    st.id = 'pdp-shake-style';
    st.textContent = '@keyframes pdpShake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
    document.head.appendChild(st);
  }

  renderPDPInner();
}
</script>


<script>
/* ── Cart helpers ───────────────────────────────────────────────── */
function updateCartQuantity(productId, size, color, newQty) {
  if (newQty <= 0) { removeFromCart(productId, size, color); }
  else {
    const item = window.CART.find(x => x.productId === productId && x.size === size && x.color === color);
    if (item) item.quantity = newQty;
  }
  updateCartBadge();
  renderCart();
}

/* ── renderCart ─────────────────────────────────────────────────── */
function renderCart() {
  const el = document.getElementById('app-content');

  if (!window.CART.length) {
    el.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;padding:40px 24px;">
        <div style="font-size:64px;margin-bottom:20px;">🛍</div>
        <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:12px;">Your bag is empty</h2>
        <p style="color:var(--color-text-muted);margin-bottom:28px;">Looks like you haven't added anything yet.</p>
        <button class="btn btn-primary" onclick="navigate('#/')">Continue Shopping</button>
      </div>`;
    return;
  }

  function calcSubtotal() { return window.CART.reduce((s,x) => s + x.price * x.quantity, 0); }
  function calcDelivery(sub) { return sub >= 50 ? 0 : 4.99; }
  function calcTotal(sub, del) {
    const promo = window.PROMO ? sub * window.PROMO.discount : 0;
    return sub + del - promo;
  }

  function cartHTML() {
    const subtotal = calcSubtotal();
    const delivery = calcDelivery(subtotal);
    const promoAmt = window.PROMO ? subtotal * window.PROMO.discount : 0;
    const total = calcTotal(subtotal, delivery);

    return `
      <div style="max-width:1100px;margin:0 auto;padding:32px 24px 80px;">
        <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:8px;">Your Bag</h1>
        <p style="color:var(--color-text-muted);font-size:0.85rem;margin-bottom:32px;">${window.CART.reduce((a,x)=>a+x.quantity,0)} item${window.CART.reduce((a,x)=>a+x.quantity,0)!==1?'s':''}</p>

        <div style="display:flex;gap:32px;align-items:flex-start;flex-wrap:wrap;">
          <!-- Items -->
          <div style="flex:1;min-width:280px;">
            ${window.CART.map(item => `
              <div style="display:flex;gap:16px;padding:20px 0;border-bottom:1px solid var(--color-border);align-items:flex-start;">
                <img src="${item.image}" alt="${item.name}" style="width:80px;height:80px;object-fit:cover;border-radius:4px;flex-shrink:0;background:#f0eeea;"/>
                <div style="flex:1;min-width:0;">
                  <div style="font-size:0.7rem;color:var(--color-text-muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:3px;">${item.brand}</div>
                  <div style="font-weight:600;font-size:0.9rem;margin-bottom:4px;">${item.name}</div>
                  <div style="font-size:0.78rem;color:var(--color-text-muted);margin-bottom:12px;">Size: ${item.size} | Color: ${item.color}</div>
                  <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
                    <div style="display:flex;align-items:center;border:1px solid var(--color-border);border-radius:2px;">
                      <button onclick="updateCartQuantity('${item.productId}','${item.size}','${item.color}',${item.quantity-1})" style="width:32px;height:32px;background:none;border:none;cursor:pointer;font-size:1rem;border-right:1px solid var(--color-border);">−</button>
                      <span style="width:36px;text-align:center;font-size:0.875rem;">${item.quantity}</span>
                      <button onclick="updateCartQuantity('${item.productId}','${item.size}','${item.color}',${item.quantity+1})" style="width:32px;height:32px;background:none;border:none;cursor:pointer;font-size:1rem;border-left:1px solid var(--color-border);">+</button>
                    </div>
                    <button onclick="removeFromCart('${item.productId}','${item.size}','${item.color}');updateCartBadge();renderCart();" style="font-size:0.75rem;color:var(--color-text-muted);background:none;border:none;cursor:pointer;text-decoration:underline;">Remove</button>
                  </div>
                </div>
                <div style="font-weight:600;font-size:0.9rem;flex-shrink:0;">${formatPrice(item.price * item.quantity)}</div>
              </div>`).join('')}
            <div style="margin-top:24px;">
              <a href="#/" style="font-size:0.8rem;color:var(--color-gold);font-weight:600;letter-spacing:0.06em;text-transform:uppercase;text-decoration:none;" onclick="navigate('#/')">← Continue Shopping</a>
            </div>
          </div>

          <!-- Summary -->
          <div style="width:300px;flex-shrink:0;position:sticky;top:80px;border:1px solid var(--color-border);border-radius:4px;padding:24px;">
            <h3 style="font-size:0.9rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:20px;">Order Summary</h3>

            <div style="display:flex;justify-content:space-between;margin-bottom:10px;font-size:0.875rem;">
              <span style="color:var(--color-text-muted);">Subtotal</span>
              <span>${formatPrice(subtotal)}</span>
            </div>
            <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:0.875rem;">
              <span style="color:var(--color-text-muted);">Delivery</span>
              <span style="color:${delivery===0?'#27ae60':'inherit'}">${delivery===0?'FREE':formatPrice(delivery)}</span>
            </div>
            ${window.PROMO ? `
            <div style="display:flex;justify-content:space-between;margin-bottom:16px;font-size:0.875rem;">
              <span style="color:#27ae60;">Promo (${window.PROMO.code})</span>
              <span style="color:#27ae60;">−${formatPrice(promoAmt)}</span>
            </div>` : ''}

            <!-- Promo input -->
            <div style="margin-bottom:20px;" id="cart-promo-wrap">
              ${window.PROMO ? `
                <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:#f0fdf4;border:1px solid #86efac;border-radius:3px;font-size:0.8rem;">
                  <span style="color:#16a34a;font-weight:600;">✓ ${window.PROMO.code} applied</span>
                  <button onclick="window.PROMO=null;renderCart();" style="font-size:0.75rem;color:#c0392b;background:none;border:none;cursor:pointer;text-decoration:underline;">Remove</button>
                </div>` : `
                <div style="display:flex;gap:8px;">
                  <input id="promo-input" type="text" placeholder="Promo code" style="flex:1;padding:9px 12px;border:1px solid var(--color-border);border-radius:3px;font-size:0.83rem;outline:none;" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/>
                  <button class="btn btn-outlined btn-sm" onclick="applyPromo()">Apply</button>
                </div>
                <div id="promo-msg" style="font-size:0.75rem;margin-top:6px;"></div>`}
            </div>

            <div style="display:flex;justify-content:space-between;font-size:1rem;font-weight:700;padding-top:16px;border-top:1px solid var(--color-border);margin-bottom:20px;">
              <span>Total</span>
              <span>${formatPrice(total)}</span>
            </div>

            <button class="btn btn-primary btn-full" onclick="navigate('#/checkout')">Proceed to Checkout</button>

            <div style="text-align:center;margin-top:14px;font-size:0.72rem;color:var(--color-text-muted);letter-spacing:0.05em;">VISA | MC | PayPal | Apple Pay</div>
          </div>
        </div>
      </div>`;
  }

  el.innerHTML = cartHTML();
}

window.applyPromo = function() {
  const input = document.getElementById('promo-input');
  const msg = document.getElementById('promo-msg');
  if (!input || !msg) return;
  const code = (input.value || '').trim().toUpperCase();
  if (code === 'LUMINO20') {
    window.PROMO = { code: 'LUMINO20', discount: 0.20 };
    renderCart();
  } else {
    msg.style.color = '#c0392b';
    msg.textContent = 'Invalid promo code.';
  }
};

/* ── renderCheckout ─────────────────────────────────────────────── */
function renderCheckout() {
  if (!window.CART.length) { navigate('#/cart'); return; }
  const el = document.getElementById('app-content');
  window.CHECKOUT_DATA = window.CHECKOUT_DATA || {};

  let stepState = 1;
  let showGuestBanner = !window.CURRENT_USER && !window.GUEST_MODE;

  const steps = ['Details','Delivery','Review'];

  function progressBar() {
    return `
      <div style="display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:40px;">
        ${steps.map((s,i) => {
          const n = i+1;
          const active = stepState === n;
          const done = stepState > n;
          return `
            <div style="display:flex;align-items:center;">
              <div style="display:flex;flex-direction:column;align-items:center;gap:6px;">
                <div style="width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;
                  background:${done?'var(--color-gold)':active?'var(--color-primary)':'#e5e5e5'};
                  color:${done||active?'#fff':'#999'};">${done?'✓':n}</div>
                <span style="font-size:0.7rem;font-weight:${active?'700':'400'};color:${active?'var(--color-primary)':'#999'};letter-spacing:0.06em;text-transform:uppercase;">${n}. ${s}</span>
              </div>
              ${i<steps.length-1?`<div style="width:60px;height:2px;background:${done?'var(--color-gold)':'#e5e5e5'};margin:0 8px;margin-bottom:22px;"></div>`:''}
            </div>`;
        }).join('')}
      </div>`;
  }

  function guestBanner() {
    if (!showGuestBanner) return '';
    return `

  function step1HTML() {

      ${fld('address2','Address Line 2','text','',cd.address2,false,true)}
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">

      ${window.CURRENT_USER?`<label style="display:flex;align-items:center;gap:10px;font-size:0.875rem;cursor:pointer;margin-bottom:24px;"><input type="checkbox" ${cd.saveAddress?'checked':''} onchange="window.CHECKOUT_DATA.saveAddress=this.checked"> Save this address</label>`:''}

  }

  window.validateStep1 = function() {
    const required = ['firstName','lastName','email','phone','address1','city','postcode'];
    let valid = true;
    required.forEach(id => {
      const val = (window.CHECKOUT_DATA[id]||'').trim();
      const errEl = document.getElementById('co-err-'+id);
      if (!val) { if(errEl) errEl.textContent='This field is required.'; valid=false; }
      else { if(errEl) errEl.textContent=''; }
    });
    if (!window.CHECKOUT_DATA.country) window.CHECKOUT_DATA.country = 'United Kingdom';
    if (valid) { stepState=2; reRender(); }
  };

  const deliveryOptions = [
    {id:'standard', label:'Standard Delivery', sub:'3–5 business days', price: calcSubtotalCO()>=50?0:4.99, priceLabel: calcSubtotalCO()>=50?'FREE':'£4.99'},
    {id:'express',  label:'Express Delivery',  sub:'1–2 business days', price:9.99, priceLabel:'£9.99'},
    {id:'nextday',  label:'Next Day Delivery', sub:'Order by 9pm',      price:14.99, priceLabel:'£14.99'},
  ];
  if (!window.CHECKOUT_DATA.deliveryMethod) window.CHECKOUT_DATA.deliveryMethod = 'standard';

  function calcSubtotalCO() { return window.CART.reduce((s,x)=>s+x.price*x.quantity,0); }

  function step2HTML() {
    return `
      <h2 style="font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:24px;">Choose Delivery</h2>
      <div style="display:flex;flex-direction:column;gap:12px;margin-bottom:32px;">
        ${deliveryOptions.map(opt => {
          const sel = window.CHECKOUT_DATA.deliveryMethod === opt.id;
          return `
            <label style="display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border:2px solid ${sel?'var(--color-gold)':'var(--color-border)'};border-radius:8px;cursor:pointer;background:${sel?'#fdf7ee':'#fff'};transition:border-color 150ms;">
              <div style="display:flex;align-items:center;gap:12px;">
                <input type="radio" name="delivery" value="${opt.id}" ${sel?'checked':''} onchange="window.CHECKOUT_DATA.deliveryMethod='${opt.id}';reRender();" style="accent-color:var(--color-gold);width:16px;height:16px;">

  function step3HTML() {
    const subtotal = calcSubtotalCO();
    const selectedDel = deliveryOptions.find(o=>o.id===window.CHECKOUT_DATA.deliveryMethod)||deliveryOptions[0];

        ${window.CART.map(item=>`
          <div style="display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--color-border);">
            <img src="${item.image}" alt="${item.name}" style="width:48px;height:48px;object-fit:cover;border-radius:3px;background:#f0eeea;flex-shrink:0;"/>

          <div style="display:flex;justify-content:space-between;font-weight:700;font-size:1rem;padding-top:12px;border-top:1px solid var(--color-border);"><span>Total</span><span>${formatPrice(total)}</span></div>

      <div style="border:1px solid var(--color-border);border-radius:6px;padding:16px 20px;margin-bottom:24px;">

  window.placeOrder = function() {

    const selectedDel = deliveryOptions.find(o=>o.id===window.CHECKOUT_DATA.deliveryMethod)||deliveryOptions[0];
    const subtotal = window.CART.reduce((s,x)=>s+x.price*x.quantity,0);
    const promoAmt = window.PROMO ? subtotal * window.PROMO.discount : 0;
    const total = subtotal + selectedDel.price - promoAmt;
    const order = {
      id: orderId,
      items: window.CART.map(x=>({...x})),
      subtotal,
      deliveryCost: selectedDel.price,
      deliveryLabel: selectedDel.label,
      promoAmt,
      total,
      address: {...window.CHECKOUT_DATA},
      deliveryMethod: window.CHECKOUT_DATA.deliveryMethod,
      status: 'Confirmed',
      placedAt: new Date()
    };
    window.ORDERS.push(order);
    if (window.CURRENT_USER) {
      window.CURRENT_USER.orders = window.CURRENT_USER.orders || [];
      window.CURRENT_USER.orders.push(order);
    }
    window.CART = [];
    window.PROMO = null;
    updateCartBadge();
    navigate('#/order/' + orderId);
  };

  function reRender() {
    const wrap = document.getElementById('checkout-step-content');
    const pb = document.getElementById('checkout-progress');
    if (pb) pb.innerHTML = progressBar();
    if (wrap) {
      wrap.innerHTML = stepState===1 ? step1HTML() : stepState===2 ? step2HTML() : step3HTML();

    const gb = document.getElementById('checkout-guest-banner');
    if (gb) gb.innerHTML = guestBanner();
  }

  window.reRender = reRender;

  el.innerHTML = `
    <div style="max-width:640px;margin:0 auto;padding:32px 24px 80px;">
      <h1 style="font-family:'Playfair Display',serif;font-size:1.4rem;margin-bottom:28px;text-align:center;">Checkout</h1>

}

        <p style="text-align:center;font-size:0.85rem;">New here? <a href="#/register" style="color:var(--color-gold);font-weight:600;text-decoration:none;" onclick="navigate('#/register')">Create an account</a></p>

window.doLogin = function() {
  const email = (document.getElementById('login-email').value||'').trim().toLowerCase();
  const password = (document.getElementById('login-password').value||'');
  const errEl = document.getElementById('login-error');
  const user = window.USERS.find(u => u.email.toLowerCase() === email);
  if (!user) {
    errEl.textContent = 'No account found with this email.';
    errEl.style.display = 'block'; return;
  }
  if (user.password !== password) {
    errEl.textContent = 'Incorrect password.';
    errEl.style.display = 'block'; return;
  }
  window.CURRENT_USER = user;
  renderHeader();
  navigate('#/account');
};
