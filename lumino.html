window.doRegister = function() {
  const first   = (document.getElementById('reg-first').value||'').trim();
  const last    = (document.getElementById('reg-last').value||'').trim();
  const email   = (document.getElementById('reg-email').value||'').trim();
  const pass    = (document.getElementById('reg-pass').value||'');
  const confirm = (document.getElementById('reg-confirm').value||'');
  const errEl   = document.getElementById('reg-error');
  const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  errEl.style.display = 'none';

  if (!first||!last||!email||!pass||!confirm) { errEl.textContent='All fields are required.'; errEl.style.display='block'; return; }
  if (!emailRe.test(email)) { errEl.textContent='Please enter a valid email address.'; errEl.style.display='block'; return; }
  if (pass.length < 8) { errEl.textContent='Password must be at least 8 characters.'; errEl.style.display='block'; return; }
  if (pass !== confirm) { errEl.textContent='Passwords do not match.'; errEl.style.display='block'; return; }
  if (window.USERS.find(u=>u.email.toLowerCase()===email.toLowerCase())) { errEl.textContent='An account with this email already exists.'; errEl.style.display='block'; return; }

  const user = { id:'user_'+Date.now(), firstName:first, lastName:last, email, password:pass, orders:[], createdAt:new Date() };
  window.USERS.push(user);
  window.CURRENT_USER = user;
  renderHeader();
  navigate('#/account');
};

/* ── renderAccount ──────────────────────────────────────────────── */
function renderAccount() {
  if (!window.CURRENT_USER) { navigate('#/login'); return; }
  const el = document.getElementById('app-content');
  const u = window.CURRENT_USER;
  let activeTab = 'overview';

  function statusBadge(status) {
    const map = { Confirmed:'#16a34a', Processing:'#d97706', Delivered:'#2563eb' };
    const col = map[status]||'#888';
    return `<span style="background:${col}22;color:${col};font-size:0.68rem;font-weight:700;padding:3px 8px;border-radius:10px;letter-spacing:0.04em;">${status}</span>`;
  }

  function tabContent() {
    if (activeTab === 'overview') {
      const orders = u.orders || [];
      const spent = orders.reduce((s,o)=>s+(o.total||0),0);
      const joined = new Date(u.createdAt).toLocaleDateString('en-GB',{month:'long',year:'numeric'});
      return `
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:24px;">Welcome back, ${u.firstName}!</h2>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:36px;">
          ${[
            {label:'Total Orders', value: orders.length},
            {label:'Total Spent',  value: formatPrice(spent)},
            {label:'Member Since', value: joined},
          ].map(s=>`
            <div style="border:1px solid var(--color-border);border-radius:8px;padding:20px 24px;">
              <div style="font-size:1.4rem;font-weight:700;margin-bottom:4px;">${s.value}</div>
              <div style="font-size:0.75rem;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.08em;">${s.label}</div>
            </div>`).join('')}
        </div>
        ${orders.length ? `
          <h3 style="font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:14px;">Recent Orders</h3>
          <div style="border:1px solid var(--color-border);border-radius:6px;overflow:hidden;">
            ${[...orders].reverse().slice(0,3).map(o=>`
              <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--color-border);cursor:pointer;" onclick="navigate('#/order/${o.id}')" onmouseover="this.style.background='#fafaf8'" onmouseout="this.style.background=''">
                <div>
                  <div style="font-size:0.875rem;font-weight:600;">${o.id}</div>
                  <div style="font-size:0.75rem;color:var(--color-text-muted);">${new Date(o.placedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'})}</div>
                </div>
                <div style="text-align:right;display:flex;align-items:center;gap:12px;">
                  <span style="font-size:0.875rem;font-weight:600;">${formatPrice(o.total)}</span>
                  ${statusBadge(o.status)}
                </div>
              </div>`).join('')}
          </div>` : `<p style="color:var(--color-text-muted);font-size:0.875rem;">No orders yet — <a href="#/" style="color:var(--color-gold);" onclick="navigate('#/')">start shopping</a>!</p>`}`;
    }

    if (activeTab === 'orders') {
      const orders = u.orders || [];
      if (!orders.length) return `<div style="text-align:center;padding:48px 0;"><p style="color:var(--color-text-muted);margin-bottom:16px;">No orders yet. Start shopping!</p><button class="btn btn-primary" onclick="navigate('#/')">Shop Now</button></div>`;
      return `
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:24px;">My Orders</h2>
        <div style="border:1px solid var(--color-border);border-radius:6px;overflow:hidden;">
          <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:12px 20px;background:#fafaf8;border-bottom:1px solid var(--color-border);font-size:0.72rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-muted);">
            <span>Order ID</span><span>Date</span><span>Items</span><span>Total</span><span>Status</span>
          </div>
          ${[...orders].reverse().map(o=>`
            <div style="display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr;padding:14px 20px;border-bottom:1px solid var(--color-border);align-items:center;cursor:pointer;font-size:0.875rem;" onclick="navigate('#/order/${o.id}')" onmouseover="this.style.background='#fafaf8'" onmouseout="this.style.background=''">
              <span style="font-weight:600;color:var(--color-gold);">${o.id}</span>
              <span style="color:var(--color-text-muted);">${new Date(o.placedAt).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>
              <span>${(o.items||[]).reduce((a,x)=>a+x.quantity,0)}</span>
              <span style="font-weight:600;">${formatPrice(o.total)}</span>
              <span>${statusBadge(o.status)}</span>
            </div>`).join('')}
        </div>`;
    }

    if (activeTab === 'addresses') {
      return `
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:24px;">Saved Addresses</h2>
        <div style="border:2px dashed var(--color-border);border-radius:8px;padding:40px;text-align:center;">
          <p style="color:var(--color-text-muted);margin-bottom:8px;">No saved addresses yet.</p>
          <p style="font-size:0.8rem;color:#bbb;">Addresses saved during checkout will appear here.</p>
        </div>`;
    }

    if (activeTab === 'settings') {
      return `
        <h2 style="font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:24px;">Account Settings</h2>
        <div style="max-width:480px;">
          <div id="settings-success" style="display:none;background:#f0fdf4;border:1px solid #86efac;border-radius:4px;padding:10px 14px;font-size:0.8rem;color:#16a34a;margin-bottom:16px;">Changes saved!</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="form-group"><label class="form-label">First Name</label><input class="form-input" id="st-first" value="${u.firstName}" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
            <div class="form-group"><label class="form-label">Last Name</label><input class="form-input" id="st-last" value="${u.lastName}" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
          </div>
          <div class="form-group"><label class="form-label">Email Address</label><input class="form-input" id="st-email" type="email" value="${u.email}" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
          <button class="btn btn-primary" style="margin-bottom:40px;" onclick="
            window.CURRENT_USER.firstName=document.getElementById('st-first').value.trim()||window.CURRENT_USER.firstName;
            window.CURRENT_USER.lastName=document.getElementById('st-last').value.trim()||window.CURRENT_USER.lastName;
            window.CURRENT_USER.email=document.getElementById('st-email').value.trim()||window.CURRENT_USER.email;
            renderHeader();
            document.getElementById('settings-success').style.display='block';
            setTimeout(()=>{const s=document.getElementById('settings-success');if(s)s.style.display='none';},3000);">Save Changes</button>

          <div style="border-top:1px solid var(--color-border);padding-top:24px;margin-bottom:24px;">
            <h3 style="font-size:0.85rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:16px;">Update Password</h3>
            <div class="form-group"><label class="form-label">Current Password</label><input class="form-input" id="st-cur-pass" type="password" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
            <div class="form-group"><label class="form-label">New Password</label><input class="form-input" id="st-new-pass" type="password" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
            <div class="form-group"><label class="form-label">Confirm New Password</label><input class="form-input" id="st-conf-pass" type="password" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'"/></div>
            <div id="pw-error" style="color:#c0392b;font-size:0.78rem;margin-bottom:10px;display:none;"></div>
            <button class="btn btn-outlined" onclick="
              const cur=document.getElementById('st-cur-pass').value;
              const nw=document.getElementById('st-new-pass').value;
              const cf=document.getElementById('st-conf-pass').value;
              const pwe=document.getElementById('pw-error');
              if(cur!==window.CURRENT_USER.password){pwe.textContent='Current password incorrect.';pwe.style.display='block';return;}
              if(nw.length<8){pwe.textContent='New password must be at least 8 characters.';pwe.style.display='block';return;}
              if(nw!==cf){pwe.textContent='Passwords do not match.';pwe.style.display='block';return;}
              window.CURRENT_USER.password=nw;pwe.style.display='none';
              document.getElementById('settings-success').style.display='block';
              setTimeout(()=>{const s=document.getElementById('settings-success');if(s)s.style.display='none';},3000);">Update Password</button>
          </div>

          <div style="border-top:1px solid var(--color-border);padding-top:24px;">
            <p style="font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--color-text-muted);margin-bottom:12px;">Danger Zone</p>
            <button class="btn btn-outlined" style="border-color:#c0392b;color:#c0392b;" onmouseover="this.style.background='#c0392b';this.style.color='#fff';" onmouseout="this.style.background='transparent';this.style.color='#c0392b';" onclick="window.CURRENT_USER=null;renderHeader();navigate('#/');">Sign Out</button>
          </div>
        </div>`;
    }
    return '';
  }

  function renderTabs() {
    const tabs = [{id:'overview',label:'Overview'},{id:'orders',label:'Orders'},{id:'addresses',label:'Addresses'},{id:'settings',label:'Settings'}];
    const tabBar = tabs.map(t=>`
      <button onclick="activeTab='${t.id}';document.getElementById('acct-tab-content').innerHTML=tabContent();document.querySelectorAll('.acct-tab').forEach(b=>{b.style.borderBottom=b.dataset.tab==='${t.id}'?'2px solid var(--color-primary)':'2px solid transparent';b.style.color=b.dataset.tab==='${t.id}'?'var(--color-primary)':'var(--color-text-muted)';});"
        class="acct-tab" data-tab="${t.id}" style="padding:12px 20px;background:none;border:none;border-bottom:2px solid ${activeTab===t.id?'var(--color-primary)':'transparent'};color:${activeTab===t.id?'var(--color-primary)':'var(--color-text-muted)'};font-size:0.875rem;font-weight:600;cursor:pointer;letter-spacing:0.04em;transition:all 150ms;">${t.label}</button>`).join('');
    return `<div style="display:flex;border-bottom:1px solid var(--color-border);margin-bottom:32px;">${tabBar}</div>`;
  }

  el.innerHTML = `
    <div style="max-width:900px;margin:0 auto;padding:32px 24px 80px;">
      ${renderTabs()}
      <div id="acct-tab-content">${tabContent()}</div>
    </div>`;
}

/* ── renderSearch ───────────────────────────────────────────────── */
function renderSearch() {
  const el = document.getElementById('app-content');
  const query = (window.SEARCH_QUERY || '').trim();

  if (!query) {
    el.innerHTML = `
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;padding:40px 24px;text-align:center;">
        <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:12px;">Search</h2>
        <p style="color:var(--color-text-muted);margin-bottom:24px;">Discover styles, brands, and more.</p>
        <div style="width:100%;max-width:520px;position:relative;">
          <input id="search-page-input" class="form-input" type="text" placeholder="Search for products, brands, styles..." style="padding-right:48px;font-size:1rem;height:52px;" onfocus="this.style.borderColor='var(--color-gold)'" onblur="this.style.borderColor='var(--color-border)'" onkeydown="if(event.key==='Enter'){window.SEARCH_QUERY=this.value.trim();renderSearch();}"/>
          <button onclick="window.SEARCH_QUERY=document.getElementById('search-page-input').value.trim();renderSearch();" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:1.2rem;cursor:pointer;color:var(--color-text-muted);">🔍</button>
        </div>
      </div>`;
    return;
  }

  const results = searchProducts(query);

  if (!results.length) {
    el.innerHTML = `
      <div style="max-width:700px;margin:0 auto;padding:48px 24px;text-align:center;">
        <h2 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:12px;">No results for "${query}"</h2>
        <p style="color:var(--color-text-muted);margin-bottom:28px;">We couldn't find anything matching your search. Try one of these:</p>
        <div style="display:flex;flex-wrap:wrap;gap:10px;justify-content:center;">
          ${['dresses','jackets','sneakers','bags','scarves'].map(t=>`<button class="btn btn-outlined btn-sm" onclick="window.SEARCH_QUERY='${t}';renderSearch();">${t}</button>`).join('')}
        </div>
        <button class="btn btn-primary" style="margin-top:32px;" onclick="navigate('#/')">Back to Home</button>
      </div>`;
    return;
  }

  /* Re-use PLP layout with search results */
  const uniqueSizes = [...new Set(results.flatMap(p=>p.sizes))];
  const uniqueColors = [...new Set(results.flatMap(p=>p.colors))];
  const allBrands = [...new Set(results.map(p=>p.brand))];
  let sortKey = 'recommended';
  let offset = 0;
  const PAGE = 24;
  let searchFilters = { minPrice:0, maxPrice:500, sizes:[], colors:[], brands:[], minRating:0, inStockOnly:false };

  const colorMap = {Black:'#1a1a1a',White:'#f8f8f8',Navy:'#001f5b',Red:'#c0392b',Blue:'#2980b9',Green:'#27ae60',Beige:'#d4b896',Camel:'#c19a6b',Grey:'#888',Pink:'#e91e8c',Ivory:'#fffff0',Cream:'#fffdd0',Brown:'#795548',Nude:'#e8c99a',Sage:'#87a878',Tan:'#d2b48c',Gold:'#c8a96e',Silver:'#c0c0c0',Charcoal:'#36454f',Olive:'#808000',Sand:'#c2b280',Ecru:'#c2b280',Burgundy:'#800020',Blush:'#de5d83',Champagne:'#f7e7ce',Oatmeal:'#e4d5b7'};
  function getColor(c){for(const[k,v]of Object.entries(colorMap)){if(c.toLowerCase().includes(k.toLowerCase()))return v;}return'#ccc';}
  function starsHTML(r){const n=Math.round(r);return'★'.repeat(n)+'☆'.repeat(5-n);}

  function applySearchAndRender() {
    let res = results.filter(p=>{
      if(p.price<searchFilters.minPrice||p.price>searchFilters.maxPrice)return false;
      if(searchFilters.sizes.length&&!searchFilters.sizes.some(s=>p.sizes.includes(s)))return false;
      if(searchFilters.colors.length&&!searchFilters.colors.some(c=>p.colors.some(pc=>pc.toLowerCase().includes(c.toLowerCase()))))return false;
      if(searchFilters.brands.length&&!searchFilters.brands.includes(p.brand))return false;
      if(searchFilters.minRating&&p.rating<searchFilters.minRating)return false;
      if(searchFilters.inStockOnly&&!p.inStock)return false;
      return true;
    });
    res = sortProducts(res, sortKey);
    const page = res.slice(0, offset+PAGE);
    const grid = document.getElementById('search-grid');
    const countEl = document.getElementById('search-count');
    const moreBtn = document.getElementById('search-more');
    if(countEl) countEl.textContent = `${res.length} result${res.length!==1?'s':''} for "${query}"`;
    if(grid) grid.innerHTML = page.map(p=>`
      <div class="product-card" onclick="navigate('#/product/${p.id}')">
        <div class="product-card-image-wrap">
          <img class="img-main" src="${p.images[0]}" alt="${p.name}" loading="lazy"/>
          ${p.images[1]?`<img class="img-hover" src="${p.images[1]}" alt="" loading="lazy"/>`:''}
          <div class="product-badges">${p.discount?'<span class="badge badge-sale">SALE</span>':''}${p.tags.includes('new')&&!p.discount?'<span class="badge badge-new">NEW</span>':''}</div>
          <div class="product-card-actions">
            <button class="btn btn-primary btn-sm" style="flex:1;" onclick="event.stopPropagation();addToCart('${p.id}','${p.sizes[0]}','${p.colors[0]}',1);showToast('Added to bag!');updateCartBadge();">Add to Bag</button>
          </div>
        </div>
        <div class="product-card-info">
          <div class="product-card-brand">${p.brand}</div>
          <div class="product-card-name" style="-webkit-line-clamp:2;display:-webkit-box;-webkit-box-orient:vertical;overflow:hidden;">${p.name}</div>
          <div style="color:var(--color-gold);font-size:0.75rem;">${starsHTML(p.rating)}</div>
          <div class="product-card-price">${p.discount?`<span class="price-current price-sale">${formatPrice(p.price)}</span><span class="price-original">${formatPrice(p.originalPrice)}</span>`:`<span class="price-current">${formatPrice(p.price)}</span>`}</div>
        </div>
      </div>`).join('');
    if(moreBtn) moreBtn.style.display = offset+PAGE>=res.length?'none':'block';
  }

  el.innerHTML = `
    <div style="max-width:1200px;margin:0 auto;padding:24px 24px 80px;">
      <div style="margin-bottom:24px;">
        <h1 style="font-family:'Playfair Display',serif;font-size:1.8rem;margin-bottom:4px;">Search Results</h1>
        <p id="search-count" style="color:var(--color-text-muted);font-size:0.875rem;"></p>
      </div>
      <div style="display:flex;gap:32px;align-items:flex-start;">
        <div class="hide-mobile" style="width:240px;flex-shrink:0;">
          <div style="position:sticky;top:120px;">
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
              <h3 style="font-size:0.9rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;">Filter</h3>
              <button onclick="searchFilters={minPrice:0,maxPrice:500,sizes:[],colors:[],brands:[],minRating:0,inStockOnly:false};offset=0;applySearchAndRender();" style="font-size:0.75rem;color:var(--color-gold);background:none;border:none;cursor:pointer;text-decoration:underline;">Clear All</button>
            </div>
            <div style="margin-bottom:20px;">
              <p style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Price</p>
              <div style="display:flex;gap:8px;margin-bottom:6px;">
                <input type="range" min="0" max="500" value="${searchFilters.minPrice}" style="flex:1;" oninput="searchFilters.minPrice=+this.value;document.getElementById('search-price-lbl').textContent='£'+searchFilters.minPrice+' – £'+searchFilters.maxPrice;offset=0;applySearchAndRender()"/>
                <input type="range" min="0" max="500" value="${searchFilters.maxPrice}" style="flex:1;" oninput="searchFilters.maxPrice=+this.value;document.getElementById('search-price-lbl').textContent='£'+searchFilters.minPrice+' – £'+searchFilters.maxPrice;offset=0;applySearchAndRender()"/>
              </div>
              <p id="search-price-lbl" style="font-size:0.8rem;color:var(--color-text-muted);">£${searchFilters.minPrice} – £${searchFilters.maxPrice}</p>
            </div>
            <div style="margin-bottom:20px;">
              <p style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Brand</p>
              ${allBrands.slice(0,8).map(b=>`<label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;font-size:0.83rem;"><input type="checkbox" onchange="if(this.checked){searchFilters.brands.push('${b}');}else{searchFilters.brands=searchFilters.brands.filter(x=>x!=='${b}');}offset=0;applySearchAndRender();"> ${b}</label>`).join('')}
            </div>
            <div style="margin-bottom:20px;">
              <p style="font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;">Rating</p>
              ${[{v:4,l:'4★ & above'},{v:3,l:'3★ & above'},{v:0,l:'All'}].map(r=>`<label style="display:flex;align-items:center;gap:8px;margin-bottom:8px;cursor:pointer;font-size:0.83rem;"><input type="radio" name="s-rating" ${searchFilters.minRating===r.v?'checked':''} onchange="searchFilters.minRating=${r.v};offset=0;applySearchAndRender();"> ${r.l}</label>`).join('')}
            </div>
            <label style="display:flex;align-items:center;gap:10px;cursor:pointer;font-size:0.83rem;"><input type="checkbox" onchange="searchFilters.inStockOnly=this.checked;offset=0;applySearchAndRender();"> In Stock Only</label>
          </div>
        </div>
        <div style="flex:1;min-width:0;">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
            <span style="font-size:0.83rem;color:var(--color-text-muted);"></span>
            <select onchange="sortKey=this.value;offset=0;applySearchAndRender();" style="padding:8px 12px;border:1px solid var(--color-border);border-radius:2px;font-size:0.83rem;background:#fff;cursor:pointer;">
              <option value="recommended">Recommended</option>
              <option value="price_asc">Price: Low–High</option>
              <option value="price_desc">Price: High–Low</option>
              <option value="newest">Newest</option>
              <option value="rating">Rating</option>
            </select>
          </div>
          <div id="search-grid" style="display:grid;grid-template-columns:repeat(${window.innerWidth>1024?3:2},1fr);gap:20px;"></div>
          <div style="text-align:center;margin-top:40px;">
            <button id="search-more" class="btn btn-outlined" onclick="offset+=24;applySearchAndRender();">Load More</button>
          </div>
        </div>
      </div>
    </div>`;

  applySearchAndRender();
}
</script>


<script>
/* ── Chat widget styles (injected once) ─────────────────────────── */

  const s = document.createElement('style');
  s.id = 'chat-extra-styles';
  s.textContent = `
    #chat-fab {
      position:fixed;bottom:24px;right:24px;z-index:9999;
      width:56px;height:56px;border-radius:50%;
      background:var(--color-gold);border:none;cursor:pointer;

      display:none;position:fixed;bottom:96px;right:24px;
      width:360px;height:520px;z-index:9998;

    }
    #chat-window.open{display:flex;}
    @keyframes chatSlideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    #chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px;background:#fafaf8;}
    #chat-messages::-webkit-scrollbar{width:4px;}
    #chat-messages::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px;}
    .chat-msg-user{
      align-self:flex-end;background:#0a0a0a;color:#fff;
      border-radius:16px 16px 4px 16px;max-width:80%;
      padding:10px 14px;font-size:0.83rem;line-height:1.45;word-break:break-word;
    }
    .chat-msg-assistant{
      align-self:flex-start;background:#f1f1f1;color:#0a0a0a;
      border-radius:16px 16px 16px 4px;max-width:85%;
      padding:10px 14px;font-size:0.83rem;line-height:1.5;word-break:break-word;
    }
    #typing-indicator{align-self:flex-start;background:#f1f1f1;border-radius:16px 16px 16px 4px;padding:12px 16px;display:flex;gap:5px;align-items:center;}
    .typing-dot{width:7px;height:7px;border-radius:50%;background:#aaa;animation:typingBounce 1.2s ease-in-out infinite;}
    .typing-dot:nth-child(2){animation-delay:0.2s;}
    .typing-dot:nth-child(3){animation-delay:0.4s;}
    @keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
    #chat-input-area{border-top:1px solid var(--color-border);padding:12px;display:flex;gap:8px;background:#fff;flex-shrink:0;}
    #chat-input{flex:1;padding:9px 13px;border:1px solid var(--color-border);border-radius:20px;font-size:0.83rem;outline:none;font-family:'Inter',sans-serif;transition:border-color 200ms;}
    #chat-input:focus{border-color:var(--color-gold);}
    #chat-send-btn{width:36px;height:36px;border-radius:50%;background:var(--color-gold);color:#fff;border:none;cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background 200ms;}
    #chat-send-btn:hover{background:#b8945a;}
    #api-key-banner{background:#fef3c7;border-bottom:1px solid #fde68a;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;font-size:0.75rem;color:#92400e;flex-shrink:0;}
    #api-key-form{background:#fafaf8;border-bottom:1px solid var(--color-border);padding:12px 14px;display:none;flex-shrink:0;}
    #api-key-form input{width:100%;padding:8px 12px;border:1px solid var(--color-border);border-radius:4px;font-size:0.8rem;margin-bottom:8px;outline:none;font-family:inherit;}
    #api-key-form input:focus{border-color:var(--color-gold);}
    @media(max-width:400px){#chat-window{width:calc(100vw - 32px);right:16px;bottom:88px;}}
  `;
  document.head.appendChild(s);
})();

/* ── renderChatButton ───────────────────────────────────────────── */
function renderChatButton() {
  const root = document.getElementById('chat-root');
  if (!root) return;
  root.innerHTML = `
    <button id="chat-fab" aria-label="Open chat assistant" onclick="toggleChat()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </button>
    <div id="chat-window" role="dialog" aria-label="LUMINO Chat Assistant">
      <div style="background:#0a0a0a;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-radius:16px 16px 0 0;">
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:8px;height:8px;border-radius:50%;background:#22c55e;"></div>
          <span style="font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:500;">LUMINO Assistant</span>
        </div>
        <div style="display:flex;align-items:center;gap:6px;">
          <button id="chat-gear-btn" aria-label="Set API key" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:none;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;justify-content:center;transition:background 150ms;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">⚙</button>
          <button onclick="toggleChat()" aria-label="Close chat" style="width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:none;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:background 150ms;" onmouseover="this.style.background='rgba(255,255,255,0.2)'" onmouseout="this.style.background='rgba(255,255,255,0.1)'">&times;</button>
        </div>
      </div>

      <div id="api-key-banner">
        <span>🔑 Enter your API key to enable AI responses</span>
        <button onclick="toggleApiKeyForm()" style="background:none;border:none;cursor:pointer;font-size:0.75rem;color:#92400e;font-weight:700;text-decoration:underline;">Set Key →</button>
      </div>

      <div id="api-key-form">
        <p style="font-size:0.72rem;color:#888;margin-bottom:6px;letter-spacing:0.04em;">Anthropic API key (stored in session only)</p>
        <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." autocomplete="off"/>
        <div style="display:flex;gap:8px;align-items:center;">
          <button onclick="saveApiKey()" style="padding:7px 16px;background:var(--color-gold);color:#fff;border:none;border-radius:3px;font-size:0.78rem;font-weight:600;cursor:pointer;">Save Key</button>
          <button onclick="toggleApiKeyForm()" style="font-size:0.75rem;color:#888;background:none;border:none;cursor:pointer;text-decoration:underline;">Cancel</button>
        </div>
      </div>

      <div id="chat-messages"></div>

      <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Ask me anything…" maxlength="500"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage();}"/>
        <button id="chat-send-btn" onclick="sendChatMessage()" aria-label="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  `;

  /* Gear toggle */
  const gearBtn = document.getElementById('chat-gear-btn');
  if (gearBtn) gearBtn.onclick = toggleApiKeyForm;

  /* Show/hide banner based on saved key */
  _syncApiKeyBanner();
}

/* ── API key helpers ────────────────────────────────────────────── */
function toggleApiKeyForm() {
  const form = document.getElementById('api-key-form');
  if (!form) return;
  const open = form.style.display === 'block';
  form.style.display = open ? 'none' : 'block';
  if (!open) {
    const inp = document.getElementById('api-key-input');
    const saved = sessionStorage.getItem('lumino_api_key') || '';
    if (inp) { inp.value = saved; inp.focus(); }
  }
}

function saveApiKey() {
  const inp = document.getElementById('api-key-input');
  if (!inp) return;
  const key = inp.value.trim();
  if (key) {
    sessionStorage.setItem('lumino_api_key', key);
    _syncApiKeyBanner();
    toggleApiKeyForm();
    appendChatMessage('assistant', '✓ API key saved for this session. How can I help you today?');
  }
}

function _syncApiKeyBanner() {
  const banner = document.getElementById('api-key-banner');
  if (!banner) return;
  banner.style.display = sessionStorage.getItem('lumino_api_key') ? 'none' : 'flex';
}

/* ── toggleChat ─────────────────────────────────────────────────── */
let _chatOpened = false;
function toggleChat() {
  const win = document.getElementById('chat-window');
  if (!win) return;
  const isOpen = win.classList.contains('open');
  if (isOpen) {
    win.classList.remove('open');
    win.style.display = 'none';
  } else {
    win.classList.add('open');
    win.style.display = 'flex';
    _syncApiKeyBanner();
    if (!_chatOpened) {
      _chatOpened = true;
      window.CHAT_HISTORY = [];
      const msgs = document.getElementById('chat-messages');
      if (msgs && msgs.children.length === 0) {
        appendChatMessage('assistant', "Hi! I'm your LUMINO shopping assistant. I can help you find products, manage your cart, answer questions, and even update the catalog. What can I help with today?");
      }
    }
    setTimeout(() => {
      const inp = document.getElementById('chat-input');
      if (inp) inp.focus();
    }, 200);
  }
}

/* ── appendChatMessage ──────────────────────────────────────────── */
function appendChatMessage(role, content) {
  const container = document.getElementById('chat-messages');
  if (!container) return;
  const div = document.createElement('div');
  div.className = role === 'user' ? 'chat-msg-user' : 'chat-msg-assistant';
  /* Simple markdown-ish: bold, line breaks */
  div.innerHTML = String(content)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br/>');
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

/* ── Typing indicator ───────────────────────────────────────────── */
function showTypingIndicator() {
  const container = document.getElementById('chat-messages');
  if (!container || document.getElementById('typing-indicator')) return;
  const div = document.createElement('div');
  div.id = 'typing-indicator';
  div.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTypingIndicator() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

/* ── sendChatMessage ────────────────────────────────────────────── */
async function sendChatMessage() {
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  appendChatMessage('user', text);
  input.value = '';
  window.CHAT_HISTORY.push({ role: 'user', content: text });
  showTypingIndicator();

  try {
    const responseText = await callClaudeAPI(window.CHAT_HISTORY);
    if (!responseText) return;
    hideTypingIndicator();
    const cleanText = handleChatAction(responseText);
    appendChatMessage('assistant', cleanText || responseText);
    window.CHAT_HISTORY.push({ role: 'assistant', content: responseText });
  } catch (err) {
    hideTypingIndicator();
    console.error('Chat error:', err);
    appendChatMessage('assistant', 'Sorry, I\'m having trouble connecting. Please check your API key and try again.');
  }
}

/* ── callClaudeAPI ──────────────────────────────────────────────── */
async function callClaudeAPI(messages) {
  const apiKey = sessionStorage.getItem('lumino_api_key');
  if (!apiKey) {
    appendChatMessage('assistant', 'Please set your Anthropic API key using the ⚙ gear icon above.');
    return null;
  }

  const cartSummary = JSON.stringify(
    window.CART.map(i => ({ name: i.name, size: i.size, color: i.color, qty: i.quantity, price: i.price }))
  );
  const userJson = window.CURRENT_USER
    ? JSON.stringify({ name: window.CURRENT_USER.firstName, email: window.CURRENT_USER.email })
    : '"Guest"';

  const systemPrompt = `You are LUMINO, an agentic fashion shopping assistant for a luxury fashion e-commerce site.

CURRENT STORE STATE:
- Total products in catalog: ${window.PRODUCTS.length}
- Current cart (${window.CART.length} items): ${cartSummary}
- Logged in user: ${userJson}

You can perform real actions by including JSON action blocks in your response using this exact format (one per line, no surrounding text on that line):
{"type":"ACTION_TYPE",...}

AVAILABLE ACTIONS:
{"type":"ADD_TO_CART","productId":"prod_001","size":"M","color":"Black","quantity":1}
{"type":"REMOVE_FROM_CART","productId":"prod_001"}
{"type":"CLEAR_CART"}
{"type":"NAVIGATE","route":"#/category/women"}
{"type":"SEARCH","query":"blue dress"}
{"type":"SHOW_PRODUCT","productId":"prod_005"}
{"type":"CREATE_ORDER"}
{"type":"ADD_PRODUCT","product":{"id":"prod_106","name":"Example Product","brand":"Zara","category":"women","subcategory":"tops","price":59.99,"originalPrice":null,"discount":null,"description":"A short description.","sizes":["XS","S","M","L","XL"],"colors":["Black","White"],"images":["https://images.unsplash.com/photo-1434389677669-e08b4cac3105?w=600&h=800&fit=crop","https://images.unsplash.com/photo-1485518882345-15568f57cf3c?w=600&h=800&fit=crop"],"rating":4.5,"reviews":0,"inStock":true,"tags":[],"featured":false}}
{"type":"DELETE_PRODUCT","productId":"prod_001"}
{"type":"UPDATE_PRODUCT","productId":"prod_001","updates":{"price":79.99,"inStock":false}}

RULES:
- Always execute action blocks — the UI handles them automatically
- After executing an action, confirm it in natural language
- For ADD_TO_CART: pick a real productId from the catalog (prod_001 through prod_105)
- Be concise, warm, and helpful. Max 3-5 products per list
- Always use £ for prices
- If user asks what is in their cart, describe the cartSummary contents
- When recommending products, mention the name, brand, and price
- For catalog edits (ADD_PRODUCT, UPDATE_PRODUCT, DELETE_PRODUCT) confirm the change and explain what was done`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 1000,
      system: systemPrompt,
      messages: messages
    })
  });

  const data = await response.json();
  if (!response.ok) throw new Error(data.error?.message || 'API error ' + response.status);
  const assistantText = data.content[0].text;
  return assistantText;
}

/* ── handleChatAction ───────────────────────────────────────────── */
function handleChatAction(responseText) {
  const actionRegex = /\{[^{}]*"type"\s*:\s*"[A-Z_]+"[^{}]*\}/g;
  const matches = responseText.match(actionRegex) || [];

  matches.forEach(match => {
    try {
      const action = JSON.parse(match);
      switch (action.type) {

        case 'ADD_TO_CART': {
          const p = window.PRODUCTS.find(x => x.id === action.productId);
          if (p) {
            addToCart(action.productId, action.size || p.sizes[0], action.color || p.colors[0], action.quantity || 1);
            updateCartBadge();
            /* Bounce cart icon */
            const badge = document.getElementById('cart-badge');
            if (badge) { badge.classList.remove('bounce'); void badge.offsetWidth; badge.classList.add('bounce'); }
          }
          break;
        }

        case 'REMOVE_FROM_CART': {
          const item = window.CART.find(x => x.productId === action.productId);
          if (item) removeFromCart(item.productId, item.size, item.color);
          updateCartBadge();
          break;
        }

        case 'CLEAR_CART':
          window.CART = [];
          updateCartBadge();
          break;

        case 'NAVIGATE':
          if (action.route) navigate(action.route);
          break;

        case 'SEARCH':
          if (action.query) {
            window.SEARCH_QUERY = action.query;
            navigate('#/search');
          }
          break;

        case 'SHOW_PRODUCT':
          if (action.productId) navigate('#/product/' + action.productId);
          break;

        case 'CREATE_ORDER': {
          if (!window.CURRENT_USER) {
            appendChatMessage('assistant', 'Please sign in to place an order.');
            break;
          }
          if (!window.CART.length) {
            appendChatMessage('assistant', 'Your cart is empty — add some items first!');
            break;
          }
          const orderId = 'ORD-' + Date.now();
          const subtotal = window.CART.reduce((s, x) => s + x.price * x.quantity, 0);
          const order = {
            id: orderId,
            items: window.CART.map(x => ({ ...x })),
            subtotal,
            deliveryCost: subtotal >= 50 ? 0 : 4.99,
            deliveryLabel: 'Standard Delivery',
            promoAmt: 0,
            total: subtotal + (subtotal >= 50 ? 0 : 4.99),
            address: window.CHECKOUT_DATA || {},
            deliveryMethod: 'standard',
            status: 'Confirmed',
            placedAt: new Date()
          };
          window.ORDERS.push(order);
          window.CURRENT_USER.orders = window.CURRENT_USER.orders || [];
          window.CURRENT_USER.orders.push(order);
          window.CART = [];
          updateCartBadge();
          navigate('#/order/' + orderId);
          break;
        }

        case 'ADD_PRODUCT': {
          const prod = action.product;
          if (prod && prod.id && prod.name && prod.category && prod.price) {
            const exists = window.PRODUCTS.find(x => x.id === prod.id);
            if (!exists) {
              window.PRODUCTS.push(prod);
              /* Re-render PLP if currently on one */
              const h = window.location.hash;
              if (h.startsWith('#/category/')) renderPLP(h.replace('#/category/', ''));
            }
          }
          break;
        }

        case 'DELETE_PRODUCT': {
          if (action.productId) {
            window.PRODUCTS = window.PRODUCTS.filter(x => x.id !== action.productId);
            const h = window.location.hash;
            if (h.startsWith('#/category/')) renderPLP(h.replace('#/category/', ''));
          }
          break;
        }

        case 'UPDATE_PRODUCT': {
          const idx = window.PRODUCTS.findIndex(x => x.id === action.productId);
          if (idx > -1 && action.updates) {
            Object.assign(window.PRODUCTS[idx], action.updates);
            const h = window.location.hash;
            if (h === '#/product/' + action.productId) renderPDP(action.productId);
            else if (h.startsWith('#/category/')) renderPLP(h.replace('#/category/', ''));
          }
          break;
        }
      }
    } catch (e) {
      /* silently skip malformed action blocks */
    }
  });

  /* Strip all action JSON blocks from displayed text */
  return responseText.replace(actionRegex, '').replace(/\n{3,}/g, '\n\n').trim();
}
</script>

<script>
/* ── Final wiring ───────────────────────────────────────────────── */
window.addEventListener('load', () => {
  if (!window.location.hash || window.location.hash === '') {
    window.location.hash = '#/';
  }
  renderPage();
});

function bounceCartIcon() {
  const icon = document.querySelector('.cart-icon');
  if (icon) {
    icon.classList.add('bounce');
    setTimeout(() => icon.classList.remove('bounce'), 600);
  }
}

function updateActiveNav() {
  const hash = window.location.hash;
  document.querySelectorAll('.cat-nav-link').forEach(link => {
    link.classList.toggle('active', link.getAttribute('href') === hash);
  });
}
window.addEventListener('hashchange', updateActiveNav);
</script>
